name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Verify security guardrails
        run: npm run verify:guardrails

      - name: Run security regression tests
        run: npm run test:security

      - name: Run unit tests
        run: npm test

      - name: Install Supabase CLI
        # Required by `npm run types:db` (which calls `supabase gen types`).
        # Always install — fast binary fetch, harmless when the next
        # step skips the actual type-check on missing access token.
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify Supabase types are in sync with schema
        # Regenerates src/types/database.types.ts from the live Supabase
        # project schema and fails if it differs from what's committed.
        # Skipped (with a warning) when SUPABASE_ACCESS_TOKEN is not set —
        # e.g. on PRs from forks where the secret isn't exposed.
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN not set — skipping types drift check"
            exit 0
          fi
          npm run types:db
          if ! git diff --exit-code src/types/database.types.ts; then
            echo "::error::src/types/database.types.ts is out of date. Run 'npm run types:db' locally and commit the result."
            exit 1
          fi

      - name: Build application
        run: npm run build
